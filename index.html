<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Ultimate Gift</title>

<style>
body {
    margin:0;
    font-family: Arial;
    text-align:center;
    background:#0f0f0f;
    color:white;
}

/* صندوق */
.box {
    margin-top:80px;
    background:#1e1e1e;
    padding:30px;
    border-radius:15px;
    display:inline-block;
}

/* أزرار */
button {
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:10px;
    background:#ff0040;
    color:white;
    cursor:pointer;
}

input,textarea {
    width:80%;
    padding:10px;
    margin:10px;
    border-radius:10px;
    border:none;
}
</style>
</head>

<body>

<!-- الرئيسية -->
<div id="home" class="box">
    <h1>🔥 Ultimate Gift</h1>
    <button onclick="goCreate()">إنشاء هدية</button>
</div>

<!-- إنشاء -->
<div id="create" class="box" style="display:none;">
    <h2>🎁 إنشاء</h2>
    <input id="sender" placeholder="اسمك"><br>
    <input id="receiver" placeholder="اسم المستلم"><br>
    <input id="pass" placeholder="كلمة سر"><br>
    <textarea id="msg" placeholder="رسالة"></textarea><br>
    <button onclick="makeLink()">إنشاء رابط</button>
    <div id="linkBox"></div>
</div>

<!-- عرض -->
<div id="view" class="box" style="display:none;">
    <h2 id="title"></h2>
    <input id="passInput" placeholder="كلمة السر"><br>
    <button onclick="unlock()">فتح الهدية</button>
    <div id="content"></div>
</div>

<script>

// تحويل لصفحة الإنشاء
function goCreate(){
    document.getElementById("home").style.display="none";
    document.getElementById("create").style.display="block";
}

// إنشاء الرابط
function makeLink(){
    let sender = document.getElementById("sender").value;
    let receiver = document.getElementById("receiver").value;
    let msg = document.getElementById("msg").value;
    let pass = document.getElementById("pass").value;

    if(!sender || !receiver || !msg || !pass){
        alert("املأ كل الحقول");
        return;
    }

    let url = window.location.origin + window.location.pathname +
    `?name=${encodeURIComponent(receiver)}&from=${encodeURIComponent(sender)}&msg=${encodeURIComponent(msg)}&pass=${encodeURIComponent(pass)}`;

    document.getElementById("linkBox").innerHTML =
    `<input value="${url}" style="width:90%" readonly>`;
}

// قراءة الرابط
let params = new URLSearchParams(window.location.search);

let name = params.get("name");
let from = params.get("from");
let msg = params.get("msg");
let pass = params.get("pass");

// تحقق قوي (هذا أهم شي)
if(name !== null && from !== null && msg !== null && pass !== null){

    document.getElementById("home").style.display="none";
    document.getElementById("view").style.display="block";

    document.getElementById("title").innerText =
    `🎁 مرحباً ${name} هدية من ${from}`;

    // نخزن البيانات
    window.giftData = {msg, pass};
}

// فتح الهدية
function unlock(){
    if(!window.giftData){
        alert("لا توجد هدية");
        return;
    }

    let inputPass = document.getElementById("passInput").value;

    if(inputPass !== window.giftData.pass){
        alert("❌ كلمة السر غلط");
        return;
    }

    document.getElementById("content").innerHTML =
    "💌 " + window.giftData.msg;
}

</script>

</body>
</html>
