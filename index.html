<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🎁 هدية فخمة</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    text-align: center;
    color: white;
    overflow: hidden;
}

.container {
    margin-top: 80px;
}

.box {
    background: rgba(255,255,255,0.2);
    padding: 30px;
    border-radius: 20px;
    display: inline-block;
    backdrop-filter: blur(15px);
}

input, textarea {
    width: 80%;
    padding: 10px;
    margin: 10px;
    border: none;
    border-radius: 10px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: white;
    color: #ff4b5c;
    cursor: pointer;
}

.hidden { display: none; }

#giftMessage {
    font-size: 24px;
    margin-top: 20px;
}

.heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: float 4s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0); opacity:1; }
    100% { transform: translateY(-800px); opacity:0; }
}
</style>
</head>

<body>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<div id="home" class="container">
    <div class="box">
        <h1>🌸 مرحباً</h1>
        <button onclick="showCreate()">إنشاء هدية</button>
    </div>
</div>

<div id="create" class="container hidden">
    <div class="box">
        <h2>🎁 إنشاء هدية</h2>
        <input id="sender" placeholder="اسمك">
        <input id="receiver" placeholder="اسم المستلم">
        <textarea id="desc" placeholder="رسالة الهدية"></textarea>
        <br>
        <button onclick="generateLink()">إنشاء رابط</button>
        <div id="linkBox"></div>
    </div>
</div>

<div id="view" class="container hidden">
    <div class="box">
        <h1 id="welcomeText"></h1>
        <button onclick="openGift()">🎀 فتح الهدية</button>
        <div id="giftMessage"></div>
    </div>
</div>

<script>
// عرض صفحة الإنشاء
function showCreate(){
    home.classList.add("hidden");
    create.classList.remove("hidden");
}

// توليد الرابط
function generateLink(){
    let s = sender.value;
    let r = receiver.value;
    let d = desc.value;

    if(!s || !r || !d){
        alert("املأ كل الحقول 😅");
        return;
    }

    let url = location.origin + location.pathname +
    `?name=${encodeURIComponent(r)}&from=${encodeURIComponent(s)}&msg=${encodeURIComponent(d)}`;

    linkBox.innerHTML = `
    <input value="${url}" readonly style="width:90%"><br><br>
    <button onclick="navigator.clipboard.writeText('${url}')">نسخ الرابط</button>
    `;
}

// قراءة الرابط
function getParams(){
    let p = new URLSearchParams(location.search);
    return {
        sender: p.get("from"),
        receiver: p.get("name"),
        desc: p.get("msg")
    };
}

// عند فتح الموقع
window.onload = ()=>{
    let d = getParams();
    if(d.sender){
        home.classList.add("hidden");
        view.classList.remove("hidden");
        welcomeText.innerText = `🎁 مرحباً ${d.receiver}، هدية من ${d.sender}`;
        window.msg = d.desc;
    }
};

// فتح الهدية
function openGift(){
    music.play();

    // كتابة تدريجية
    let text = "💌 " + window.msg;
    let i = 0;
    giftMessage.innerHTML = "";

    let type = setInterval(()=>{
        giftMessage.innerHTML += text[i];
        i++;
        if(i >= text.length) clearInterval(type);
    }, 50);

    // قلوب
    for(let i=0;i<30;i++){
        let h = document.createElement("div");
        h.className = "heart";
        h.innerHTML = "❤️";
        h.style.left = Math.random()*100 + "%";
        h.style.top = "100%";
        document.body.appendChild(h);

        setTimeout(()=>h.remove(),4000);
    }
}
</script>

</body>
</html>
