<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🔥 Ultimate Gift Pro</title>

<style>
body {
    margin:0;
    font-family: Arial;
    text-align:center;
    color:white;
    background: linear-gradient(270deg,#ff0040,#000,#ff7300);
    background-size:600% 600%;
    animation:bg 10s infinite;
}

@keyframes bg {
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}

.box {
    margin-top:80px;
    background:rgba(0,0,0,0.5);
    padding:30px;
    border-radius:20px;
    display:inline-block;
    backdrop-filter:blur(15px);
}

/* أزرار فخمة */
button {
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#ff0040,#ff4b2b);
    color:white;
    cursor:pointer;
    box-shadow:0 0 15px #ff0040;
    transition:0.3s;
}

button:hover {
    transform:scale(1.1);
    box-shadow:0 0 30px #ff0040;
}

input,textarea {
    width:80%;
    padding:10px;
    margin:10px;
    border:none;
    border-radius:10px;
}

/* قلوب */
.heart {
    position:absolute;
    animation:float 4s linear infinite;
}
@keyframes float {
    0%{transform:translateY(0);}
    100%{transform:translateY(-800px);opacity:0;}
}
</style>

</head>
<body>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<!-- الصفحة الرئيسية -->
<div id="home" class="box">
    <h1>🔥 Ultimate Gift</h1>
    <button onclick="goCreate()">إنشاء هدية</button>
</div>

<!-- الإنشاء -->
<div id="create" class="box" style="display:none;">
    <h2>🎁 إنشاء هدية</h2>
    <input id="sender" placeholder="اسمك"><br>
    <input id="receiver" placeholder="اسم المستلم"><br>
    <input id="pass" placeholder="كلمة سر"><br>
    <textarea id="msg" placeholder="رسالة"></textarea><br>
    <button onclick="makeLink()">إنشاء رابط</button>
    <div id="linkBox"></div>
</div>

<!-- العرض -->
<div id="view" class="box" style="display:none;">
    <h2 id="title"></h2>
    <input id="passInput" placeholder="كلمة السر"><br>
    <button onclick="unlock()">🎀 فتح الهدية</button>
    <div id="count"></div>
    <div id="content"></div>
</div>

<script>

// انتقال
function goCreate(){
    home.style.display="none";
    create.style.display="block";
}

// إنشاء رابط
function makeLink(){
    let url = location.origin + location.pathname +
    `?name=${receiver.value}&from=${sender.value}&msg=${encodeURIComponent(msg.value)}&pass=${pass.value}`;

    linkBox.innerHTML = `<input value="${url}" style="width:90%" readonly>`;
}

// قراءة الرابط
let p=new URLSearchParams(location.search);
let data={
    n:p.get("name"),
    f:p.get("from"),
    m:p.get("msg"),
    pass:p.get("pass")
};

// عرض الهدية
if(data.n){
    home.style.display="none";
    view.style.display="block";
    title.innerText=`🎁 مرحباً ${data.n} هدية من ${data.f}`;
}

// فتح
function unlock(){
    if(passInput.value !== data.pass){
        alert("❌ كلمة السر غلط");
        return;
    }

    let i=3;
    count.innerHTML="⏳ "+i;

    let timer=setInterval(()=>{
        i--;
        count.innerHTML="⏳ "+i;

        if(i==0){
            clearInterval(timer);
            openGift();
        }
    },1000);
}

// عرض الهدية
function openGift(){
    music.play();

    content.innerHTML="";

    let text="💌 "+data.m;
    let i=0;

    let t=setInterval(()=>{
        content.innerHTML+=text[i];
        i++;
        if(i>=text.length) clearInterval(t);
    },40);

    hearts();
    confetti();
}

// قلوب
function hearts(){
    for(let i=0;i<30;i++){
        let h=document.createElement("div");
        h.className="heart";
        h.innerHTML="❤️";
        h.style.left=Math.random()*100+"%";
        h.style.top="100%";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),4000);
    }
}

// كونفتي
function confetti(){
    for(let i=0;i<80;i++){
        let c=document.createElement("div");
        c.style.position="absolute";
        c.style.width="5px";
        c.style.height="5px";
        c.style.background="white";
        c.style.left=Math.random()*100+"%";
        c.style.top="0";
        document.body.appendChild(c);

        let fall=setInterval(()=>{
            c.style.top=(parseInt(c.style.top)+5)+"px";
        },20);

        setTimeout(()=>{clearInterval(fall);c.remove();},2000);
    }
}

</script>

</body>
</html>
