<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🔥 Ultimate Gift X</title>

<style>
body {
    margin:0;
    font-family: Arial;
    text-align:center;
    color:white;
    overflow:hidden;
    background: linear-gradient(270deg,#ff0040,#ff7300,#ff00c8);
    background-size:600% 600%;
    animation:bg 10s infinite;
}

@keyframes bg {
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}

.box {
    margin-top:80px;
    background:rgba(0,0,0,0.4);
    padding:30px;
    border-radius:20px;
    backdrop-filter:blur(20px);
    display:inline-block;
}

/* أزرار */
button {
    position:relative;
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#ff0040,#ff4b2b);
    color:white;
    cursor:pointer;
    overflow:hidden;
}

button:active {
    transform:scale(0.9);
}

/* ripple */
button::after {
    content:"";
    position:absolute;
    width:0;
    height:0;
    border-radius:50%;
    background:rgba(255,255,255,0.5);
    transform:translate(-50%,-50%);
    top:50%; left:50%;
}

button:active::after {
    width:200px;
    height:200px;
    transition:0.3s;
}

/* shake */
.shake {
    animation:shake 0.3s;
}
@keyframes shake {
    0%{transform:translateX(0)}
    25%{transform:translateX(-5px)}
    50%{transform:translateX(5px)}
    75%{transform:translateX(-5px)}
}

/* flash */
.flash {
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    top:0;
    left:0;
    opacity:0;
}
</style>

</head>
<body>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<div id="createPage" class="box" style="display:none;">
<h2>🎁 إنشاء هدية</h2>
<input id="sender" placeholder="اسمك"><br>
<input id="receiver" placeholder="اسم المستلم"><br>
<input id="pass" placeholder="كلمة سر"><br>
<input id="img" placeholder="رابط صورة"><br>
<textarea id="msg" placeholder="رسالة"></textarea><br>
<button onclick="makeLink()">إنشاء رابط</button>
<div id="linkBox"></div>
</div>

<div id="viewPage" class="box" style="display:none;">
<h2 id="title"></h2>
<input id="passInput" placeholder="كلمة السر"><br>
<button onclick="unlock()">🎀 فتح الهدية</button>
<div id="count"></div>
<div id="content"></div>
</div>

<div id="flash" class="flash"></div>

<script>

function playClick(){
    clickSound.play();
    if(navigator.vibrate) navigator.vibrate(50);
}

// تحديد الصفحة
if(location.pathname.includes("create")){
    createPage.style.display="block";
}else{
    viewPage.style.display="block";
}

// إنشاء الرابط
function makeLink(){
    playClick();

    let url = location.origin + location.pathname.replace("create","") +
    `?name=${receiver.value}&from=${sender.value}&msg=${encodeURIComponent(msg.value)}&pass=${pass.value}&img=${img.value}`;

    linkBox.innerHTML = `<input value="${url}" style="width:90%" readonly>`;
}

// قراءة الرابط
let p=new URLSearchParams(location.search);
let data={
    n:p.get("name"),
    f:p.get("from"),
    m:p.get("msg"),
    pass:p.get("pass"),
    img:p.get("img")
};

if(data.n){
    title.innerText=`🎁 مرحباً ${data.n} هدية من ${data.f}`;
}

// فتح الهدية
function unlock(){
    playClick();

    if(passInput.value !== data.pass){
        passInput.classList.add("shake");
        setTimeout(()=>passInput.classList.remove("shake"),300);
        return;
    }

    // عداد
    let i=3;
    count.innerHTML="⏳ "+i;
    let timer=setInterval(()=>{
        i--;
        count.innerHTML="⏳ "+i;
        if(i==0){
            clearInterval(timer);
            openGift();
        }
    },1000);
}

function openGift(){
    music.play();

    // فلاش
    flash.style.opacity=1;
    setTimeout(()=>flash.style.opacity=0,300);

    // رسالة
    content.innerHTML="";
    if(data.img){
        content.innerHTML+=`<img src="${data.img}" width="200"><br>`;
    }

    let text="💌 "+data.m;
    let i=0;
    let t=setInterval(()=>{
        content.innerHTML+=text[i];
        i++;
        if(i>=text.length) clearInterval(t);
    },40);

    confetti();
}

// كونفتي
function confetti(){
    for(let i=0;i<120;i++){
        let c=document.createElement("div");
        c.style.position="absolute";
        c.style.width="5px";
        c.style.height="5px";
        c.style.background="white";
        c.style.left=Math.random()*100+"%";
        c.style.top="0";
        document.body.appendChild(c);

        let fall=setInterval(()=>{
            c.style.top=(parseInt(c.style.top)+5)+"px";
        },20);

        setTimeout(()=>{clearInterval(fall);c.remove();},2000);
    }
}

</script>

</body>
</html>
