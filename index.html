<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🔥 Ultimate Gift Pro</title>

<style>
body {
    margin:0;
    font-family: Arial;
    text-align:center;
    color:white;
    background: linear-gradient(270deg,#ff0040,#000,#ff7300);
    background-size:600% 600%;
    animation:bg 10s infinite;
}

@keyframes bg {
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}

.box {
    margin-top:80px;
    background:rgba(0,0,0,0.6);
    padding:30px;
    border-radius:20px;
    display:inline-block;
    backdrop-filter:blur(15px);
}

/* أزرار */
button {
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#ff0040,#ff4b2b);
    color:white;
    cursor:pointer;
    box-shadow:0 0 15px #ff0040;
    transition:0.3s;
}

button:hover {
    transform:scale(1.1);
    box-shadow:0 0 30px #ff0040;
}

input,textarea {
    width:80%;
    padding:10px;
    margin:10px;
    border-radius:10px;
    border:none;
}

/* قلوب */
.heart {
    position:absolute;
    animation:float 4s linear infinite;
}
@keyframes float {
    0%{transform:translateY(0);}
    100%{transform:translateY(-800px);opacity:0;}
}
</style>
</head>

<body>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<!-- الصفحة الرئيسية -->
<div id="home" class="box">
    <h1>🔥 Ultimate Gift</h1>
    <button onclick="goCreate()">إنشاء هدية</button>
</div>

<!-- الإنشاء -->
<div id="create" class="box" style="display:none;">
    <h2>🎁 إنشاء</h2>
    <input id="sender" placeholder="اسمك"><br>
    <input id="receiver" placeholder="اسم المستلم"><br>
    <input id="pass" placeholder="كلمة سر"><br>
    <textarea id="msg" placeholder="رسالة"></textarea><br>
    <button onclick="makeLink()">إنشاء رابط</button>
    <div id="linkBox"></div>
</div>

<!-- العرض -->
<div id="view" class="box" style="display:none;">
    <h2 id="title"></h2>
    <input id="passInput" placeholder="كلمة السر"><br>
    <button onclick="unlock()">🎀 فتح الهدية</button>
    <div id="count"></div>
    <div id="content"></div>
</div>

<script>

// الانتقال للإنشاء
function goCreate(){
    home.style.display="none";
    create.style.display="block";
}

// إنشاء الرابط
function makeLink(){
    let sender = document.getElementById("sender").value;
    let receiver = document.getElementById("receiver").value;
    let msg = document.getElementById("msg").value;
    let pass = document.getElementById("pass").value;

    if(!sender || !receiver || !msg || !pass){
        alert("املأ كل الحقول");
        return;
    }

    let url = window.location.origin + window.location.pathname +
    `?name=${encodeURIComponent(receiver)}&from=${encodeURIComponent(sender)}&msg=${encodeURIComponent(msg)}&pass=${encodeURIComponent(pass)}`;

    document.getElementById("linkBox").innerHTML =
    `<input value="${url}" style="width:90%" readonly>`;
}

// قراءة الرابط
let params = new URLSearchParams(window.location.search);

let name = params.get("name");
let from = params.get("from");
let msg = params.get("msg");
let pass = params.get("pass");

// تحقق صحيح
if(name && from && msg && pass){
    home.style.display="none";
    view.style.display="block";

    document.getElementById("title").innerText =
    `🎁 مرحباً ${name} هدية من ${from}`;

    window.giftData = {msg, pass};
}

// فتح الهدية
function unlock(){

    if(!window.giftData){
        alert("لا توجد هدية");
        return;
    }

    let inputPass = document.getElementById("passInput").value;

    if(inputPass !== window.giftData.pass){
        alert("❌ كلمة السر غلط");
        return;
    }

    let i=3;
    document.getElementById("count").innerHTML="⏳ "+i;

    let timer=setInterval(()=>{
        i--;
        document.getElementById("count").innerHTML="⏳ "+i;

        if(i==0){
            clearInterval(timer);
            openGift();
        }
    },1000);
}

// عرض الهدية
function openGift(){
    document.getElementById("music").play();

    let text="💌 "+window.giftData.msg;
    let i=0;

    document.getElementById("content").innerHTML="";

    let t=setInterval(()=>{
        document.getElementById("content").innerHTML+=text[i];
        i++;
        if(i>=text.length) clearInterval(t);
    },40);

    hearts();
    confetti();
}

// قلوب
function hearts(){
    for(let i=0;i<25;i++){
        let h=document.createElement("div");
        h.className="heart";
        h.innerHTML="❤️";
        h.style.left=Math.random()*100+"%";
        h.style.top="100%";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),4000);
    }
}

// كونفتي
function confetti(){
    for(let i=0;i<70;i++){
        let c=document.createElement("div");
        c.style.position="absolute";
        c.style.width="5px";
        c.style.height="5px";
        c.style.background="white";
        c.style.left=Math.random()*100+"%";
        c.style.top="0";
        document.body.appendChild(c);

        let fall=setInterval(()=>{
            c.style.top=(parseInt(c.style.top)+5)+"px";
        },20);

        setTimeout(()=>{clearInterval(fall);c.remove();},2000);
    }
}

</script>

</body>
</html>
